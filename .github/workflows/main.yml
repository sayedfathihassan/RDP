name: RDP-Fixed

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        shell: powershell
        run: |
          # تفعيل الـ RDP وتعديل الـ Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1
          
          # فتح المنفذ في جدار الحماية
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          netsh advfirewall firewall add rule name="RDP-Allow" dir=in action=allow protocol=TCP localport=3389

      - name: Create RDP User
        shell: powershell
        run: |
          $Password = "P@ssw0rd123!" # يفضل استخدام سر ثابت أو توليد أبسط لتجنب أخطاء الـ Shell
          $SecurePassword = ConvertTo-SecureString $Password -AsPlainText -Force
          $User = New-LocalUser -Name "RDPUser" -Password $SecurePassword -Description "GitHub Runner RDP"
          Add-LocalGroupMember -Group "Administrators" -Member "RDPUser"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDPUser"
          
          # تخزين البيانات بأمان
          echo "RDP_USER=RDPUser" >> $env:GITHUB_ENV
          echo "RDP_PASS=$Password" >> $env:GITHUB_ENV

      - name: Install & Setup Tailscale
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait
          
          # انتظار بسيط للتأكد من أن الخدمة بدأت
          Start-Sleep -Seconds 10
          
          $tsPath = "${env:ProgramFiles}\Tailscale\tailscale.exe"
          & $tsPath up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${{ github.run_id }}
          
          # جلب الـ IP
          $tsIP = & $tsPath ip -4
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "RDP is Ready!"
          Write-Host "IP: $env:TAILSCALE_IP"
          Write-Host "User: $env:RDP_USER"
          Write-Host "Pass: $env:RDP_PASS"
          while ($true) { Start-Sleep -Seconds 300 }
